name: Furstock
options:
  bundleIdPrefix: com.shimondeitel.supplystock
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furstock:
    type: application
    platform: iOS
    sources:
      - path: Furstock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.supplystock
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furstock/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurstockTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurstockTests
      - path: Furstock.storekit
    dependencies:
      - target: Furstock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.supplystock.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurstockUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurstockUITests
    dependencies:
      - target: Furstock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.supplystock.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furstock:
    build:
      targets:
        Furstock: all
        FurstockTests: [test]
        FurstockUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furstock.storekit
    test:
      config: Debug
      storeKitConfiguration: Furstock.storekit
      targets:
        - FurstockTests
        - FurstockUITests
    archive:
      config: Release
